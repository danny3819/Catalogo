<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catálogo Cosméticos</title>

  <!-- 🔥 ICONO (FAVICON) -->
  <link rel="icon" href="/img/logo.png">

  <link rel="stylesheet" href="styles.css">

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<header>
  <h1><span><img src="/img/logo.png" alt="logo" width="30" style="border-radius: 50px;"></span> Catálogo Cosméticos</h1>
  <input type="text" id="busqueda" placeholder="¿Qué estás buscando?">
</header>

<main>
  <div id="productos" class="grid"></div>
</main>

<!-- BOTÓN FLOTANTE -->
<button class="btn-carrito" onclick="toggleCarrito()">
  🛒 <span id="contador">0</span>
</button>

<!-- PANEL CARRITO -->
<div id="carritoPanel" class="carrito-panel">
  <div class="carrito-header">
    <h3>🛒 Carrito</h3>
    <button onclick="toggleCarrito()">✖</button>
  </div>

  <ul id="carrito"></ul>
  <p id="total">Total: $0</p>

  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <span class="cerrar">&times;</span>
  <img id="imgModal" class="modal-contenido">
</div> 

<script src="app.js"></script>
</body>
</html>
